<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Development | WellStudent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: #fdfbf7;
        }

        .page-header {
            background: var(--primary-gradient);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
            text-align: center;
        }

        .skill-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
            height: 100%;
            border: none;
        }

        .skill-card:hover {
            transform: translateY(-5px);
        }

        .skill-icon-wrapper {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            font-size: 3rem;
        }

        .text-primary {
            color: #667eea !important;
        }

        .bg-primary {
            background-color: #667eea !important;
        }

        .text-success {
            color: #2ecc71 !important;
        }

        .bg-success {
            background-color: #2ecc71 !important;
        }

        .text-info {
            color: #3498db !important;
        }

        .bg-info {
            background-color: #3498db !important;
        }

        .text-warning {
            color: #f1c40f !important;
        }

        .bg-warning {
            background-color: #f1c40f !important;
        }

        .text-danger {
            color: #e74c3c !important;
        }

        .bg-danger {
            background-color: #e74c3c !important;
        }

        .progress {
            height: 10px;
            border-radius: 5px;
            background-color: #e9ecef;
            margin: 1rem 0;
        }

        .btn-action {
            width: 100%;
            border-radius: 50px;
            font-weight: 600;
            padding: 0.5rem 1rem;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="page-header">
        <div class="container">
            <h1 class="fw-bold"><i class="fas fa-rocket me-2"></i>Skill Development</h1>
            <p class="lead mb-0">Track your progress and learn new skills</p>
            <a href="/" class="btn btn-outline-light btn-sm mt-3 rounded-pill">
                <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row">
            {% for skill in skills %}
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="skill-card">
                    <div class="skill-icon-wrapper text-{{ skill.color }}">
                        <i class="{{ skill.icon }}"></i>
                    </div>
                    <div class="card-body p-4">
                        <h5 class="card-title fw-bold mb-2">{{ skill.name }}</h5>
                        <p class="text-muted small mb-3">{{ skill.description }}</p>

                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <span class="fw-bold text-{{ skill.color }}" id="percent-{{ skill._id }}">{{
                                skill.user_percent }}%</span>
                            <small class="text-muted"><span id="completed-{{ skill._id }}">{{ skill.user_completed
                                    }}</span>/{{ skill.total_modules }} Modules</small>
                        </div>

                        <div class="progress">
                            <div class="progress-bar bg-{{ skill.color }}" role="progressbar"
                                style="width: {{ skill.user_percent }}%" id="bar-{{ skill._id }}"
                                aria-valuenow="{{ skill.user_percent }}" aria-valuemin="0" aria-valuemax="100">
                            </div>
                        </div>

                        <div class="mt-3">
                            {% if skill.is_completed %}
                            <button class="btn btn-success btn-action" disabled>
                                <i class="fas fa-check-circle me-1"></i> Completed
                            </button>
                            <button class="btn btn-outline-secondary btn-sm w-100 mt-2 rounded-pill"
                                onclick="resetSkill('{{ skill._id }}')">
                                <i class="fas fa-redo me-1"></i> Restart
                            </button>
                            {% else %}
                            <button class="btn btn-outline-{{ skill.color }} btn-action"
                                onclick="updateProgress('{{ skill._id }}')">
                                <i class="fas fa-play me-1"></i> Complete Module
                            </button>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateProgress(skillId) {
            fetch(`/skills/update/${skillId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ action: 'increment' })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Update UI dynamically
                        document.getElementById(`percent-${skillId}`).innerText = data.new_percent + '%';
                        document.getElementById(`completed-${skillId}`).innerText = data.new_completed;

                        const bar = document.getElementById(`bar-${skillId}`);
                        bar.style.width = data.new_percent + '%';
                        bar.setAttribute('aria-valuenow', data.new_percent);

                        if (data.is_completed) {
                            location.reload(); // Reload to show "Completed" state button
                        }
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        function resetSkill(skillId) {
            if (!confirm("Are you sure you want to restart this skill?")) return;

            fetch(`/skills/update/${skillId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ action: 'reset' })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    }
                });
        }
    </script>
</body>

</html>
